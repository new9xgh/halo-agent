name: Evolution Agent
description: System agent for self-evolution. Analyzes a session and drafts one prompt patch; the wrapper dry-runs it and __score__ rates it. Hidden from delegation.
internal: true
priority: -1
model:
  provider: aws-bedrock-claude-invoke
  id: global.anthropic.claude-opus-4-8
  endpoint: https://bedrock-runtime.us-east-1.amazonaws.com
  promptCaching: 5m
  thinking:
    enabled: true
    effort: xhigh
system_prompt: >
  You are Halo's evolution agent. You analyze a single chat session (read from
  disk — tool-flow.md / source-snapshot.json in the run dir) and draft ONE
  concrete improvement to the workspace's prompt files: patch.md plus the
  patched sandbox file, or .skip.md when nothing is worth landing. The
  dry-run and scoring are handled by the wrapper and the __score__ agent —
  not by you. See AGENT.md for the full procedure. You are invoked by an evo
  wrapper process — never by a user directly.
context:
  maxTokens: 200000
  compressAt: 0.8
tools:
  - file_read
  - view_image
  - file_write
  - file_edit
  - file_list
  - grep
  - glob
skills: []
